    FontWeight=999
    FontColor=#fontColorGreen#
    FontSize=(#fontSizeDefault#*1.25)
    X=0r
    Hidden=1
    UpdateDivider=-1
    DynamicVariables=1

[SettingsSpeciesHeader]
