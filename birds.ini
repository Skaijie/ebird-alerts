[Rainmeter]
    @Include=#@#Settings.inc
    Update=100
    AccurateText=1
[Metadata]
    Name=Birding Alerts Widget
    Author=chilisauce
    Information=Provides frequent alerts for rare and lifer bird species. Uses the eBird API.
    Version=0.1 alpha
    License=CC BY-NC-SA 3.0
[WidgetWidth]
    Measure=Calc
    Formula=0.25*#SCREENAREAWIDTH#
    UpdateDivider=-1
[WidgetHeight]
    Measure=Calc
    Formula=0.5*#SCREENAREAHEIGHT#
    UpdateDivider=-1
    DynamicVariables=1
[ScreenRatio]
    Measure=Calc
    Formula=(#SCREENAREAHEIGHT#/1080)
    UpdateDivider=-1
    DynamicVariables=1

[TextHeight]
    Meter=String
    FontFace=#fontNameDefault#
    FontSize=#fontSizeDefault#
    FontColor=0,0,0,0
    Text=A
    X=0
    Y=0
    UpdateDivider=-1

;-------------------------
; General styles
;-------------------------
[styleTextDefault]
    FontWeight=700
    StringEffect=Shadow
    FontEffectColor=#fontColorShade#,80
    FontColor=#fontColorFront#
    FontFace=#fontNameDefault#
    FontSize=#fontSizeDefault#
    AntiAlias=1
    ClipString=1
    UpdateDivider=-1
    DynamicVariables=1

[styleButton]
    MouseOverAction=[!CommandMeasure ScriptLua "ShowButtonShape('#CURRENTSECTION#')"]
    MouseLeaveAction=[!HideMeter ButtonShape][!Redraw #CURRENTCONFIG#]
    UpdateDivider=-1
    DynamicVariables=1

;-------------------------
; Main parsers
;-------------------------
[ScriptLua]
    Measure=Script
    ScriptFile=#CURRENTPATH#syncHandler.lua
    Status=Hide
    UpdateDivider=-1
    DynamicVariables=1

[ScriptBirdList]
    Measure=Plugin
    Plugin=RunCommand
    Program="#CURRENTPATH#.conda\pythonw.exe"
    Parameter="#CURRENTPATH#sync_alerts.pyw"
    FinishAction=[!CommandMeasure ScriptLua "GetStatusText()"][!CommandMeasure ScriptLua "GetMainText('alert')"][!ActivateConfig birds\Notify][!UpdateMeter MainText][!Redraw #CURRENTCONFIG#]
    Status=Hide
    UpdateDivider=-1
    DynamicVariables=1

[ScriptTaxonomyUpdate]
    Measure=Plugin
    Plugin=RunCommand
    Program="#CURRENTPATH#.conda\pythonw.exe"
    Parameter="#CURRENTPATH#parse_taxonomy_file.pyw"
    Status=Hide
    UpdateDivider=-1
    DynamicVariables=1

[MeasureHour]
    Measure=Time
    Format=%H
    UpdateDivider=600
    DynamicVariables=1

[MeasureUpdateInterval]
    Measure=Calc
    Formula=(([MeasureHour] >= 20) || ([MeasureHour] < 6)) ? (#SettingNightRefreshRate# * 60) : (#SettingNormalRefreshRate# * 60)
    UpdateDivider=600
    DynamicVariables=1

[RefreshUpdateInterval]
    Measure=Calc
    Formula=((Floor(Counter*0.1)) % [MeasureUpdateInterval])
    IfCondition=(#CURRENTSECTION#=0) && (#SettingAutoRefresh#=1)
    IfTrueAction=[!CommandMeasure ScriptBirdList "Run"][!CommandMeasure ScriptLua "GetStatusText(1)"]
    UpdateDivider=10
    DynamicVariables=1

[getExclusionList]
    Measure=WebParser
    Url=file://#CURRENTPATH#species_excluded.txt
    RunOnStart=1
    RegExp=(?siU)^(.*)$
    FinishAction=[!UpdateMeter MainText][!Redraw]
    UpdateDivider=-1
    DynamicVariables=1

;-------------------------
; Background and header
;-------------------------
[WidgetMain]
    Meter=Shape
    X=0
    Y=0
    Shape=Rectangle 0,0,[WidgetWidth],[WidgetHeight],6 | Fill Color #fontColorBack# | StrokeWidth 1 | StrokeColor 255,255,255,0
    UpdateDivider=-1
    DynamicVariables=1

[TitleText]
    Meter=String
    MeterStyle=styleTextDefault
    StringAlign=LeftCenter
    FontColor=#fontColorGreen#
    FontSize=(#fontSizeDefault#*1.75)
    Text=Rares & Needs Alert
    X=([WidgetWidth]*0.01)r
    Y=([WidgetHeight]*0.035)r
    UpdateDivider=-1

[SettingsButton]
    Meter=String
    MeterStyle=styleTextDefault | styleButton
    StringAlign=RightCenter
    FontFace=Segoe UI Symbol
    FontColor=#fontColorGreen#
    FontSize=(#fontSizeDefault#*2)
    LeftMouseUpAction=[!CommandMeasure ScriptLua "ToggleGUI('settings')"]
    Text=[\x2699]
    X=([WidgetMain:X]+[WidgetWidth]*0.995)
    Y=0r

[AlertStatusButton]
    Meter=String
    MeterStyle=styleTextDefault
    StringAlign=RightCenter
    FontFace=Segoe UI Symbol
    FontWeight=999
    FontColor=#fontColorGreen#
    FontSize=(#fontSizeDefault#*1.25)
    Text=[\x2714]
    X=(-[WidgetWidth]*0.1)r
    Y=0r
    ToolTipType=1
    ToolTipWidth=([WidgetWidth]/4)
    LeftMouseUpAction=[!CommandMeasure ScriptBirdList "Run"][!CommandMeasure ScriptLua "GetStatusText(1)"]

[MeterScrollTrack]
    Meter=Shape
    Group=MainGUIFixed | ScrollBarGroup
    Shape=Rectangle 0,0,4,([WidgetHeight]*0.775) | Fill Color 0,0,0,192 | StrokeWidth 0
    X=([WidgetMain:X]+[WidgetWidth]*0.98)
    Y=([WidgetMain:Y]+[WidgetHeight]*0.1)
    UpdateDivider=-1
    DynamicVariables=1

[MeterScrollThumb]
    Meter=Shape
    Group=MainGUIFixed | ScrollBarGroup
    X=([WidgetMain:X]+[WidgetWidth]*0.98)
    Y=0r
    Shape=Rectangle 0,0,4,#ThumbHeight# | Fill Color 200,200,200,150 | StrokeWidth 0
    Hidden=1
    UpdateDivider=-1
    DynamicVariables=1

; Tabs
[Subheader]
    Meter=String
    MeterStyle=styleTextDefault
    Group=MainGUIFixed | AlertsGUI | SettingsGUI | SettingsGUIFixed
    FontColor=#fontColorGreen#
    FontSize=(#fontSizeDefault#*1.25)
    X=([WidgetMain:X]+[WidgetWidth]*0.01)
    Y=([AlertStatusButton:YH])
    Text=Alerts for #Region1#
    Hidden=1
    UpdateDivider=-1

[styleTabBase]
    Group=AlertsGUI | RegionTabs
    FontWeight=700
    FontFace=#fontNameDefault#
    FontSize=(#fontSizeDefault# * 1.25)
    StringAlign=LeftCenter
    Padding=4,0,4,0
    AntiAlias=1
    LeftMouseUpAction=[!CommandMeasure ScriptLua "SwitchTab('[#CURRENTSECTION#:Text]')"][!SetOption #CURRENTSECTION# FontColor #fontColorOpposite#]
    X=([WidgetWidth]*0.008)R
    Y=0r
    Hidden=1
    UpdateDivider=-1
    DynamicVariables=1

[styleTabInactive]
    FontColor=100,100,100,200
    SolidColor=240,240,240,0
    MouseOverAction=[!SetOption #CURRENTSECTION# FontColor #fontColorGreen#][!UpdateMeter #CURRENTSECTION#][!Redraw]
    MouseLeaveAction=[!SetOption #CURRENTSECTION# FontColor "100,100,100,200"][!UpdateMeter #CURRENTSECTION#][!Redraw]

[styleTabActive]
    FontColor=255,255,255,255
    SolidColor=54,130,75,255
    ; Active tabs don't change on hover
    MouseOverAction=[!SetOption #CURRENTSECTION# FontColor #fontColorOpposite#][!UpdateMeter #CURRENTSECTION#][!Redraw]
    MouseLeaveAction=[!SetOption #CURRENTSECTION# FontColor #fontColorOpposite#][!UpdateMeter #CURRENTSECTION#][!Redraw]

[Tab1]
    Meter=String
    MeterStyle=styleTabBase | styleTabActive

[Tab2]
    Meter=String
    MeterStyle=styleTabBase | styleTabInactive

[Tab3]
    Meter=String
    MeterStyle=styleTabBase | styleTabInactive

[Tab4]
    Meter=String
    MeterStyle=styleTabBase | styleTabInactive

[Tab5]
    Meter=String
    MeterStyle=styleTabBase | styleTabInactive

[InfoShape]
    Meter=Shape
    Shape=Rectangle 0,0,[WidgetWidth],([TextHeight:H]*3.6),2 | Fill LinearGradient MyFillGradient | StrokeWidth 0
    MyFillGradient=90 | #fontColorShade2# ; 0.0 | #fontColorBack# ; 0.05 | #fontColorBack# ; 0.95 | #fontColorShade2# ; 1.0
    X=([WidgetMain:X])
    Y=([WidgetMain:Y]+[WidgetHeight]*0.88)
    UpdateDivider=-1
    DynamicVariables=1

;-------------------------
; Alert and excluded
; species section
;-------------------------
; Styles
[styleAlertShow]
    FontColor=#fontColorShade#,80
    InlinePattern=[\u4e00-\u9fa5]+
    InlineSetting=Face | Microsoft JhengHei
    InlinePattern2=MRT|LRT
    InlineSetting2=Size | #fontSizeHalf#
    InlinePattern3=(\[N\].*?:)
    InlineSetting3=Color | #fontColorNeed#
    InlinePattern4=(\[NR\].*?:)
    InlineSetting4=Color | #fontColorNR#
    InlinePattern5=(\[R\].*?:)
    InlineSetting5=Color | #fontColorRare#
    InlinePattern6=(?<=[:|,])\s*([^:,]+?)\[C\]
    InlineSetting6=Color | #fontColorFront#
    InlinePattern7=(\[[U|C]\])
    InlineSetting7=Size | 0.1
    InlinePattern8=(\[[U|C]\])
    InlineSetting8=Color | 0,0,0,0
    InlinePattern9=\d{4}-\d{2}-\d{2}
    InlineSetting9=Color | #fontColorGreen#

[styleExcludedShow]
    FontColor=#fontColorFront#

; Meters
[MainText]
    Meter=String
    MeterStyle=styleTextDefault | styleAlertShow
    Group=MainGUIFixed
    ClipString=0
    X=([WidgetMain:X]+[WidgetWidth]*0.01)
    Y=([WidgetMain:Y]+[WidgetHeight]*0.1)
    W=([WidgetWidth]*0.95)
    MouseScrollUpAction=[!SetVariable ScrollIndex "(Clamp(#ScrollIndex# - #ScrollStep#, 1, #maxScrollIndex#))"][!CommandMeasure ScriptLua "MainTextParseScroll()"][!Redraw #CURRENTCONFIG#]
    MouseScrollDownAction=[!SetVariable ScrollIndex "(Clamp(#ScrollIndex# + #ScrollStep#, 1, #maxScrollIndex#))"][!CommandMeasure ScriptLua "MainTextParseScroll()"][!Redraw #CURRENTCONFIG#]
    UpdateDivider=-1

;-------------------------
; INFORMATION
;-------------------------
; Styles
[styleExternalLink]
    FontColor=#fontColorRare#
    InlineSetting=Underline

; Meters
[RareButton]
    Meter=String
    Group=InfoGUI
    MeterStyle=styleTextDefault | styleExternalLink | styleButton
    Text=Rares list
    X=([WidgetMain:X]+[WidgetWidth]*0.01)
    Y=([InfoShape:Y]+[InfoShape:H]*0.05)
    LeftMouseUpAction=["https://ebird.org/alert/summary?sid=SN36214&sortBy=obsDt&o=desc"]

[NeedButton]
    Meter=String
    Group=InfoGUI
    MeterStyle=styleTextDefault | styleExternalLink | styleButton
    FontColor=#fontColorNeed#
    Text=Needs list
    X=0r
    Y=1R
    LeftMouseUpAction=["https://ebird.org/alert/summary?sid=SN33562&sortBy=obsDt&o=desc"]

[ExcludedButton]
    Meter=String
    Group=InfoGUI
    MeterStyle=styleTextDefault | styleButton
    FontColor=#fontColorGreen#
    Text=Excluded species
    X=0r
    Y=1R
    LeftMouseUpAction=[!CommandMeasure ScriptLua "ToggleGUI('exclusions')"]

[VersionText]
    Meter=String
    MeterStyle=styleTextDefault
    Group=SettingsGUI | SettingsGUIFixed
    StringAlign=RightBottom
    Text=Alpha v0.1
    X=([WidgetMain:X]+[WidgetWidth]*0.99)
    Y=([StatusText:Y])
    Hidden=1

[StatusText]
    Meter=String
    MeterStyle=styleTextDefault
    Group=InfoGUI
    StringAlign=RightBottom
    X=([InfoShape:XW]-([WidgetWidth]*0.01))
    Y=([InfoShape:YH]-([WidgetHeight]*0.01))
    InlinePattern=(Error.*\n)
    InlineSetting=Color | #fontColorRed#

;-------------------------
; Settings
;-------------------------
[styleSettingHeader]
    Group=SettingsGUI | SettingsGUIFixed
    FontColor=#fontColorShade#,80
    FontSize=(#fontSizeDefault#*1.1)
    X=([WidgetMain:X]+[WidgetWidth]*0.02)
    Y=([WidgetHeight]*0.01)R
    Hidden=1

[styleImportantButton]
    FontColor=#fontColorRed#
    X=([WidgetMain:X]+[WidgetWidth]*0.02)
    Y=([WidgetHeight]*0.006)R
    
[styleSettingText]
    Group=SettingsGUI | SettingsGUIFixed
    Hidden=1
    X=([WidgetMain:X]+[WidgetWidth]*0.08)
    Y=([WidgetHeight]*0.006)R

[RefreshSkinButton]
    Meter=String
    Group=SettingsGUI | SettingsGUIFixed
    MeterStyle=styleTextDefault | styleButton | styleImportantButton
    FontColor=#fontColorGreen#
    Text=Refresh skin
    Y=([Subheader:YH]+[WidgetWidth]*0.01)
    LeftMouseUpAction=[!Refresh]
    Hidden=1

[HoldTimer]
    Measure=Calc
    Formula=((HoldTimer + 0.1)*#HoldState#)
    IfCondition=(HoldTimer>=1)
    IfTrueAction=[!CommandMeasure ScriptLua "DeleteSpeciesData()"][!CommandMeasure ScriptTaxonomyUpdate "Run"][!SetVariable HoldState 0][!UpdateMeasure #CURRENTSECTION#][!UpdateMeter ResetFileButtonBar][!Redraw #CURRENTCONFIG#]
    DynamicVariables=1

[ResetFileButton]
    Meter=String
    Group=SettingsGUI | SettingsGUIFixed
    MeterStyle=styleTextDefault | styleButton | styleImportantButton
    Text=Reset all species data
    LeftMouseDownAction=[!SetVariable HoldState 1][!UpdateMeasure HoldTimer]
    LeftMouseUpAction=[!SetVariable HoldState 0][!UpdateMeasure HoldTimer][!UpdateMeter ResetFileButtonBar][!Redraw]
    MouseLeaveAction=[!HideMeter ButtonShape][!SetVariable HoldState 0][!UpdateMeasure HoldTimer][!UpdateMeter ResetFileButtonBar][!Redraw #CURRENTCONFIG#]
    Hidden=1

[ResetFileButtonBar]
    Meter=Bar
    Group=SettingsGUI | SettingsGUIFixed
    MeasureName=HoldTimer
    X=0r
    Y=0R
    W=([ResetFileButton:W])
    H=([WidgetHeight]*0.01)
    BarColor=10,127,10,128
    SolidColor=#fontColorShade#,80
    BarOrientation=Horizontal
    DynamicVariables=1

; Regions settings
[styleRegionCode]
    Group=SettingsGUI | SettingsGUIRegions
    X=([WidgetMain:X]+[WidgetWidth]*0.05)
    Y=([WidgetHeight]*0.01)R
    Hidden=1

[styleRegionDel]
    Group=SettingsGUI | SettingsGUIRegions
    Text=X
    X=([WidgetMain:X]+[WidgetWidth]*0.975)
    Y=0r
    FontColor=#fontColorRed#
    Hidden=1

[styleInputShape]
    Group=SettingsGUI | SettingsGUIFixed
    X=([WidgetMain:X]+[WidgetWidth]*0.675)
    Y=-1r
    H=([TextHeight:H])
    SolidColor=#fontColorShade#,80
    Hidden=1

[SettingsHeaderRegion]
    Meter=String
    MeterStyle=styleTextDefault | styleSettingHeader
    Text=Regions

[SettingsRegionCount]
    Meter=String
    MeterStyle=styleTextDefault | styleSettingText
    Group=SettingsGUI | SettingsGUIFixed | SettingsGUIRegions
    X=([WidgetMain:X]+[WidgetWidth]*0.02)
    Y=5R
    Hidden=1

[AddRegionShape]
    Meter=String
    MeterStyle=styleTextDefault | styleInputShape
    Group=SettingsGUI | SettingsGUIFixed | SettingsGUIRegions
    W=([WidgetWidth]*0.3)
    Text=Add a region
    LeftMouseUpAction=[!CommandMeasure AddRegion "ExecuteBatch 1"]

[AddRegion]
    Measure=Plugin
    Plugin=InputText
    StringEffect=Shadow
    FontEffectColor=#fontColorShade#,80
    FontColor=#fontColorFront#
    FontFace=#fontNameDefault#
    SolidColor=#fontColorBack#
    X=([#CURRENTSECTION#Shape:X])
    Y=([#CURRENTSECTION#Shape:Y])
    W=([#CURRENTSECTION#Shape:W])
    H=([#CURRENTSECTION#Shape:H])
    Command1=[!CommandMeasure ScriptLua "RegionAdd('$USERINPUT$')"]

[SettingRegion1]
    Meter=String
    Group=SettingsGUI | SettingsGUIRegions | SettingsGUIFixed
    MeterStyle=styleTextDefault | styleRegionCode
    Y=3R
    Text=1. #Region1#

[RegionDel1]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionDel
    LeftMouseUpAction=[!CommandMeasure ScriptLua "RegionDel('#Region1#')"]
    Hidden=1

[SettingRegion2]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionCode
    Text=2. #Region2#

[RegionDel2]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionDel
    LeftMouseUpAction=[!CommandMeasure ScriptLua "RegionDel('#Region2#')"]

[SettingRegion3]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionCode
    Text=3. #Region3#

[RegionDel3]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionDel
    LeftMouseUpAction=[!CommandMeasure ScriptLua "RegionDel('#Region3#')"]

[SettingRegion4]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionCode
    Text=4. #Region4#

[RegionDel4]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionDel
    LeftMouseUpAction=[!CommandMeasure ScriptLua "RegionDel('#Region4#')"]

[SettingRegion5]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionCode
    Text=5. #Region5#

[RegionDel5]
    Meter=String
    MeterStyle=styleTextDefault | styleRegionDel
    LeftMouseUpAction=[!CommandMeasure ScriptLua "RegionDel('#Region5#')"]

; Binary settings
[styleCheckboxBox]
    Group=SettingsGUI | SettingsGUIFixed | SettingsCheckBox
    X=([WidgetMain:X]+[WidgetWidth]*0.03)
    Y=([#CURRENTSECTION#Text:Y]-[WidgetWidth]*0.0025)
    Shape=Rectangle (-[WidgetWidth]*0.005),([WidgetWidth]*0.005),([WidgetWidth]*0.035),([WidgetWidth]*0.035) | Fill Color 0,0,0,0 | StrokeWidth 0
    Shape2=Rectangle 0,([WidgetWidth]*0.01),([WidgetWidth]*0.025),([WidgetWidth]*0.025),([WidgetWidth]*0.005) | Fill Color 0,0,0,0 | StrokeWidth ([WidgetWidth]*0.005) | Stroke Color #fontColorFront#
    Hidden=1
    UpdateDivider=-1
    DynamicVariables=1
    LeftMouseUpAction=[!CommandMeasure ScriptLua "SettingsToggle('#CURRENTSECTION#')"]

[styleCheckboxCheck]
    Group=SettingsGUI | SettingsCheckBox
    Text=[\x2714]
