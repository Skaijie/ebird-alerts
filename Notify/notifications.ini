[Rainmeter]
    @Include=#@#Settings.inc
    Update=1000

[Variables]
    Hover=0

[WidgetWidth]
    Measure=Calc
    Formula=0.25*#SCREENAREAWIDTH#
    UpdateDivider=-1
    DynamicVariables=1

[WidgetHeight]
    Measure=Calc
    Formula=0.5*#SCREENAREAHEIGHT#
    UpdateDivider=-1
    DynamicVariables=1
    
[ScriptLuaNotif]
    Measure=Script
    ScriptFile=#CURRENTPATH#notify.lua
    RunOnStart=1
    UpdateDivider=-1
    DynamicVariables=1

[styleTextNotif]
    FontWeight=700
    StringEffect=Shadow
    FontEffectColor=192,192,192,80
    FontColor=224,224,224,224
    FontFace=Lexend
    FontSize=(8*(#SCREENAREAHEIGHT#/1080))
    AntiAlias=1
    ClipString=1
    UpdateDivider=-1
    DynamicVariables=1

[NotificationHideTimer]
    Measure=Calc
    Formula=((NotificationHideTimer + 1)*#Hover#) || Counter > 60
    IfCondition=NotificationHideTimer >= 15
    IfTrueAction=[!DeactivateConfig #CURRENTCONFIG#]
    DynamicVariables=1

[NotificationShape]
    Meter=Shape
    Group=Notification
    X=0
    Y=0
    Shape=Rectangle 0,0,([WidgetWidth]),([WidgetHeight]*0.25),([WidgetHeight]*0.02) | Fill Color 44,44,44,225 | StrokeWidth 0
    MouseOverAction=[!SetVariable Hover 1][!Redraw #CURRENTCONFIG#]
    Hidden=1
    UpdateDivider=-1
    DynamicVariables=1

[NotificationText]
    Meter=String
    MeterStyle=styleTextNotif
    Group=Notification
    Text=Sighting report: N/A
    InlinePattern=^.*?\n
    InlineSetting=Weight | 700
    InlinePattern2=[\u4e00-\u9fa5]+
    InlineSetting2=Face | Microsoft JhengHei
    InlinePattern3=MRT|LRT
    InlineSetting3=Size | #fontSizeHalf#
    InlinePattern4=(\([a-zA-Z-]*?\[N\]\))
    InlineSetting4=Color | #fontColorNeed#
    InlinePattern5=(\([a-zA-Z-]*?\[NR\]\))
    InlineSetting5=Color | #fontColorNR#
    InlinePattern6=(\([a-zA-Z-]*?\[R\]\))
    InlineSetting6=Color | #fontColorRare#
    InlinePattern7=(?<=[:|,])\s*([^:,]+?)\[U\]
    InlineSetting7=Color | #fontColorShade#,80
    InlinePattern8=(\[[U|C]\])
    InlineSetting8=Size | 0.1
    InlinePattern9=(\[[U|C]\])
    InlineSetting9=Color | 0,0,0,0
    InlinePattern10=\d{4}-\d{2}-\d{2}
    InlineSetting10=Color | #fontColorGreen#
    X=([NotificationShape:W]*0.015)r
    Y=([NotificationShape:W]*0.015)r
    Hidden=1
    ClipString=1
    W=([NotificationShape:W]*0.8)
    H=([NotificationShape:H]-[NotificationShape:W]*0.02)

[NotificationClose]
    Meter=String
    MeterStyle=styleTextNotif
    FontColor=225,54,75,255
    Group=Notification
    Text=X
    X=([NotificationShape:X]+[NotificationShape:W]*0.95)
    Y=0r
    Hidden=1
    LeftMouseUpAction=[!DeactivateConfig #CURRENTCONFIG#]